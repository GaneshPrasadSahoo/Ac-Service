<!DOCTYPE html>
<html>
<head>
    <title>Reminders - Prachi & Prachi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script>
        function getDaysAgo(dateStr) {
            const today = new Date();
            const past = new Date(dateStr);

            const diffDays = Math.floor((today - past) / (1000 * 60 * 60 * 24));

            if (diffDays === 0) return "Today";
            if (diffDays === 1) return "1 day ago";
            return diffDays + " days ago";
        }

        function isDue(dateStr) {
            const today = new Date();
            const past = new Date(dateStr);

            const diffDays = (today - past) / (1000 * 60 * 60 * 24);

            return diffDays >= 30;
        }
    </script>

</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">Customer Reminders</h2>

    <table class="table table-bordered shadow bg-white">
        <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Last Service</th>
            <th>Status</th>
            <th>Action</th>
        </tr>

        {% for c in customers %}
        <tr>
            <td>{{ c.name }}</td>
            <td>{{ c.phone }}</td>

            <td>
                <script>
                    document.write(getDaysAgo("{{ c.date }}"));
                </script>
            </td>

            <td>
                <script>
                    if (isDue("{{ c.date }}")) {
                        document.write("<span class='badge bg-danger'>Due</span>");
                    } else {
                        document.write("<span class='badge bg-success'>Recent</span>");
                    }
                </script>
            </td>

            <td>
                <a href="{{ c.link }}" target="_blank">
                    <button class="btn btn-success btn-sm">WhatsApp</button>
                </a>

                <a href="/delete/{{ c.id }}" onclick="return confirm('Delete this customer?')">
                    <button class="btn btn-danger btn-sm">Delete</button>
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <a href="/" class="btn btn-primary">Back</a>

</div>

</body>
</html>
