<!DOCTYPE html>
<html>
<head>
    <title>Prachi & Prachi AC Service</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">Prachi & Prachi AC Service</h2>

    <div class="card p-4 shadow">
        <h4>Add Customer</h4>

        <form method="POST">
            <input class="form-control mb-3" type="text" name="name" placeholder="Customer Name" required>
            <input class="form-control mb-3" type="text" name="phone" placeholder="91XXXXXXXXXX" required>
            <input class="form-control mb-3" type="date" name="date" required>
            <input class="form-control mb-3" type="text" name="message" placeholder="Message" required>

            <button class="btn btn-primary w-100">Save Customer</button>
        </form>

        <a href="/reminders" class="btn btn-success mt-3 w-100">View Reminders</a>
    </div>

</div>

</body>
</html>
